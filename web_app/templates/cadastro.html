<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Define a codificação da página -->
    <meta charset="UTF-8">

    <!-- Ajusta responsividade -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da aba -->
    <title>Cadastro - Sistema de Controle de Ativos</title>
</head>
<body>

    <!-- Título principal -->
    <h1>Cadastrar Usuário</h1>

    <!-- Mensagem de erro -->
    {% if erro %}
        <p style="color: red;">{{ erro }}</p>
    {% endif %}

    <!-- Formulário de cadastro -->
    <form method="POST" action="{{ url_for('cadastro_usuario') }}">

        <!-- E-mail -->
        <label for="email">E-mail:</label>
        <input
            type="email"
            id="email"
            name="email"
            value="{{ dados.get('email', '') if dados else '' }}"
            required
        ><br><br>

        <!-- Empresa -->
        <label for="empresa_id">Empresa:</label>
        <select id="empresa_id" name="empresa_id" required>
            <option value="">Selecione a empresa</option>
            {% for empresa in empresas %}
                <option
                    value="{{ empresa.id }}"
                    {% if dados and dados.get('empresa_id') == (empresa.id | string) %}selected{% endif %}
                >
                    {{ empresa.nome }}
                </option>
            {% endfor %}
        </select>
        <br><br>

        <!-- Senha -->
        <label for="senha">Senha:</label>
        <input
            type="password"
            id="senha"
            name="senha"
            required
        ><br><br>

        <!-- Confirmação de senha -->
        <label for="senha_confirmacao">Confirmar senha:</label>
        <input
            type="password"
            id="senha_confirmacao"
            name="senha_confirmacao"
            required
        ><br><br>

        <!-- Pergunta de recuperação -->
        <label for="pergunta">Pergunta de recuperação:</label>
        <input
            type="text"
            id="pergunta"
            name="pergunta"
            value="{{ dados.get('pergunta', '') if dados else '' }}"
            required
        ><br><br>

        <!-- Resposta de recuperação -->
        <label for="resposta">Resposta de recuperação:</label>
        <input
            type="text"
            id="resposta"
            name="resposta"
            required
        ><br><br>

        <!-- Botão de cadastro -->
        <button type="submit">Cadastrar</button>
    </form>

    <!-- Link de volta -->
    <p>
        <a href="{{ url_for('login') }}">Voltar para o login</a>
    </p>

</body>
</html>
