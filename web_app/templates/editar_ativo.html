<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Define a codificação da página -->
    <meta charset="UTF-8">

    <!-- Ajusta a responsividade -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da aba -->
    <title>Editar Ativo</title>
</head>
<body>

    <!-- Título principal -->
    <h1>Editar Ativo</h1>

    <!-- Exibe o usuário autenticado -->
    <p>Usuário logado: {{ usuario_email }}</p>

    <!-- Links principais -->
    <p>
        <a href="{{ url_for('listar_ativos') }}">Voltar para a lista de ativos</a>
        |
        <a href="{{ url_for('logout') }}">Logout</a>
    </p>

    <!-- Mensagem de erro -->
    {% if erro %}
        <p style="color: red;">{{ erro }}</p>
    {% endif %}

    <!-- Formulário de edição -->
    <form method="POST" action="{{ url_for('editar_ativo', id_ativo=id_ativo) }}">

        <!-- ID apenas para visualização -->
        <label for="id_exibicao">ID:</label>
        <input
            type="text"
            id="id_exibicao"
            value="{{ id_ativo }}"
            readonly
        ><br><br>

        <!-- Campo de tipo -->
        <label for="tipo">Tipo:</label>
        <input
            type="text"
            id="tipo"
            name="tipo"
            value="{{ dados.get('tipo', '') if dados else '' }}"
            required
        ><br><br>

        <!-- Campo de marca -->
        <label for="marca">Marca:</label>
        <input
            type="text"
            id="marca"
            name="marca"
            value="{{ dados.get('marca', '') if dados else '' }}"
            required
        ><br><br>

        <!-- Campo de modelo -->
        <label for="modelo">Modelo:</label>
        <input
            type="text"
            id="modelo"
            name="modelo"
            value="{{ dados.get('modelo', '') if dados else '' }}"
            required
        ><br><br>

        <!-- Campo de responsável -->
        <!-- Agora é opcional -->
        <label for="usuario_responsavel">Responsável:</label>
        <input
            type="text"
            id="usuario_responsavel"
            name="usuario_responsavel"
            value="{{ dados.get('usuario_responsavel', '') if dados else '' }}"
        >
        <small>Opcional. Obrigatório apenas quando o status for "Em Uso".</small>
        <br><br>

        <!-- Campo de departamento -->
        <label for="departamento">Departamento:</label>
        <input
            type="text"
            id="departamento"
            name="departamento"
            value="{{ dados.get('departamento', '') if dados else '' }}"
            required
        ><br><br>

        <!-- Campo de status com opções controladas -->
        <label for="status">Status:</label>
        <select id="status" name="status" required>
            <option value="">Selecione um status</option>
            {% for status in status_validos %}
                <option
                    value="{{ status }}"
                    {% if dados and dados.get('status') == status %}selected{% endif %}
                >
                    {{ status }}
                </option>
            {% endfor %}
        </select>
        <br><br>

        <label for="nota_fiscal">Nota Fiscal:</label>
        <input
            type="text"
            id="nota_fiscal"
            name="nota_fiscal"
            value="{{ dados.get('nota_fiscal', '') if dados else '' }}"
        >
        <br><br>

        <label for="seguro">Seguro:</label>
        <input
            type="text"
            id="seguro"
            name="seguro"
            value="{{ dados.get('seguro', '') if dados else '' }}"
        >
        <small>Preencha pelo menos um entre Nota Fiscal e Seguro.</small>
        <br><br>

        <!-- Campo de data de entrada -->
        <label for="data_entrada">Data Entrada:</label>
        <input
            type="date"
            id="data_entrada"
            name="data_entrada"
            value="{{ dados.get('data_entrada', '') if dados else '' }}"
            required
        ><br><br>

        <!-- Campo de data de saída -->
        <label for="data_saida">Data Saída:</label>
        <input
            type="date"
            id="data_saida"
            name="data_saida"
            value="{{ dados.get('data_saida', '') if dados else '' }}"
        ><br><br>

        <!-- Botão de salvar -->
        <button type="submit">Salvar alterações</button>
    </form>

</body>
</html>
