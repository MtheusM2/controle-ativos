<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Novo Ativo</title>
</head>
<body>

<h1>Cadastrar Novo Ativo</h1>

<form method="POST">

    <label>ID:</label>
    <input type="text" name="id" required><br>

    <label>Tipo:</label>
    <input type="text" name="tipo" required><br>

    <label>Marca:</label>
    <input type="text" name="marca" required><br>

    <label>Modelo:</label>
    <input type="text" name="modelo" required><br>

    <label>Responsável:</label>
    <input type="text" name="usuario_responsavel" required><br>

    <label>Departamento:</label>
    <input type="text" name="departamento" required><br>

    <label>Status:</label>
    <input type="text" name="status" required><br>

    <label>Data Entrada:</label>
    <input type="date" name="data_entrada" required><br>

    <label>Data Saída:</label>
    <input type="date" name="data_saida"><br>

    <button type="submit">Cadastrar</button>

</form>

</body>
</html>
