{% extends 'base.html' %}

{% block title %}Login - Sistema de Controle de Ativos{% endblock %}

{% block content %}
    <!-- Card de autenticacao com layout compatível com o fluxo atual de login -->
    <section class="auth-card panel">
        <div class="panel-header auth-header">
            <h2 class="title-section">Acesso Seguro</h2>
            <p class="text-muted">Autentique-se para acessar o ambiente corporativo de ativos.</p>
        </div>

        <div class="panel-body">
            <form method="POST" action="{{ url_for('login') }}" class="auth-form">
                <div class="field-group">
                    <label for="email">E-mail</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="input-control"
                        value="{{ dados.get('email', '') if dados else '' }}"
                        required
                    >
                </div>

                <div class="field-group">
                    <label for="senha">Senha</label>
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        class="input-control"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary auth-submit">
                    <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
                    <span>Entrar</span>
                </button>
            </form>

            <!-- Links auxiliares mantendo os endpoints atuais -->
            <div class="auth-links">
                <a href="{{ url_for('cadastro_usuario') }}" class="btn btn-secondary">
                    <i class="bi bi-person-plus" aria-hidden="true"></i>
                    <span>Criar conta</span>
                </a>

                <a href="{{ url_for('recuperar_senha') }}" class="btn btn-secondary">
                    <i class="bi bi-key" aria-hidden="true"></i>
                    <span>Esqueci minha senha</span>
                </a>
            </div>
        </div>
    </section>
{% endblock %}
