<!-- Barra superior com contexto de usuário e identificação do ambiente -->
<header class="topbar-panel">
    <div class="topbar-title-group">
        <h1 class="topbar-title">Plataforma de Gestão de Ativos</h1>
        <p class="topbar-subtitle">Monitoramento operacional, rastreabilidade e documentação técnica</p>
    </div>

    <!-- Informações do usuário autenticado usando variáveis já existentes -->
    <div class="topbar-user">
        <div class="user-chip">
            <i class="bi bi-person-badge" aria-hidden="true"></i>
            <span>{{ session.get('user_nome', 'Usuário') }}</span>
        </div>

        <div class="user-chip">
            <i class="bi bi-building" aria-hidden="true"></i>
            <span>{{ session.get('user_empresa_nome', 'Empresa') }}</span>
        </div>

        <div class="user-chip">
            <i class="bi bi-person-circle" aria-hidden="true"></i>
            <span>{{ usuario_email or session.get('user_email', 'Usuário') }}</span>
        </div>
    </div>
</header>
