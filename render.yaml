# Configuração Render.com para deploy do controle-ativos
# https://docs.render.com/render.yaml

services:
  - type: web
    name: controle-ativos
    env: python
    region: ohio
    plan: free

    # Build
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 60 wsgi:application

    # Health check
    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckTimeout: 10

    # Variáveis de ambiente (exemplo — substituir com valores reais no painel Render)
    envVars:
      # Flask
      - key: FLASK_DEBUG
        value: "0"
      - key: FLASK_SECRET_KEY
        sync: false  # Deve ser um secret, não um valor
      - key: APP_PEPPER
        sync: false  # Deve ser um secret
      - key: SESSION_COOKIE_SECURE
        value: "1"  # HTTPS obrigatório em produção

      # Database (externa)
      - key: DB_HOST
        sync: false  # Configurar no painel (ex: railway.internal ou PlanetScale)
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_CONNECTION_TIMEOUT
        value: "30"

      # Logging
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_DIR
        value: "/tmp/logs"  # Ephemeral; não persiste entre redeploys

      # Storage (Arquivo)
      - key: STORAGE_TYPE
        value: "s3"  # Use "local" para dev/testes; "s3" para produção

      # S3 (AWS S3, Cloudflare R2, Backblaze B2, etc.)
      - key: S3_BUCKET
        sync: false  # Seu bucket name
      - key: S3_REGION
        value: "us-east-1"  # Ajuste conforme necessário
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        value: ""  # Deixe vazio para AWS; use URL customizada para R2/B2

      # Auth
      - key: AUTH_MAX_FAILED_ATTEMPTS
        value: "5"
      - key: AUTH_LOCKOUT_MINUTES
        value: "15"
      - key: SESSION_LIFETIME_MINUTES
        value: "120"

      # PBKDF2
      - key: PBKDF2_ITERATIONS
        value: "600000"
