server {
    # Remove identificação do servidor para reduzir exposição de versão.
    server_tokens off;

    listen 80;
    server_name _;

    # Redireciona todo tráfego HTTP para HTTPS em produção com TLS.
    # Descomente e ajuste quando o certificado estiver configurado:
    # return 301 https://$host$request_uri;

    client_max_body_size 10m;

    # =========================================================
    # Security headers globais
    # =========================================================

    # Impede o browser de inferir Content-Type a partir do conteúdo.
    add_header X-Content-Type-Options    "nosniff"              always;

    # Bloqueia carregamento do sistema dentro de iframes externos.
    add_header X-Frame-Options           "DENY"                 always;

    # Controla informações enviadas no header Referer entre origens.
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Desativa APIs de geolocalização, câmera e microfone por padrão.
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # CSP mínimo: permite assets da própria origem + Bootstrap Icons CDN.
    # Ajuste conforme novos recursos forem adicionados.
    add_header Content-Security-Policy   "default-src 'self'; style-src 'self' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    # =========================================================
    # Arquivos estáticos (CSS, JS, imagens)
    # =========================================================

    location /static/ {
        alias /opt/controle_ativos/web_app/static/;

        # Bloqueia acesso direto aos uploads físicos sem autenticação.
        # O download ocorre exclusivamente pela rota autenticada /anexos/<id>/download.
        location /static/uploads/ {
            deny all;
            return 403;
        }

        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # =========================================================
    # Proxy reverso para Gunicorn
    # =========================================================

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Buffers e timeouts adequados para uploads de até 10 MB.
        proxy_read_timeout   90s;
        proxy_connect_timeout 10s;
        proxy_send_timeout   90s;
        proxy_buffer_size    16k;
        proxy_buffers        8 16k;
    }
}
